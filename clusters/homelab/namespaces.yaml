apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-namespaces
  namespace: argocd
spec:
  project: infrastructure
  source:
    # TODO: Replace with your real Git repository URL.
    repoURL: https://github.com/felstormrage/kairos.git
    targetRevision: main
    path: namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
