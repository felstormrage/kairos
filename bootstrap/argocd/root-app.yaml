apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-root
  namespace: argocd
spec:
  project: default
  source:
    # TODO: Replace with your real Git repository URL.
    # Eventually this can point at your in-cluster Gitea URL.
    repoURL: https://github.com/felstormrage/kairos.git
    targetRevision: main
    path: clusters/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
