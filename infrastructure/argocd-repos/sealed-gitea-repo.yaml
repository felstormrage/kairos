# ---------------------------------------------------------------------------
# SealedSecret: Gitea repository credentials for ArgoCD
# ---------------------------------------------------------------------------
# This file is committed to Git as an ENCRYPTED SealedSecret. It is only
# decryptable by the sealed-secrets controller running in this cluster
# (which holds the private half of the sealing key).
#
# The decrypted Secret lives in the `argocd` namespace and is labeled
# `argocd.argoproj.io/secret-type: repository`, which tells ArgoCD to use
# it as a repo credential when fetching Applications whose `repoURL`
# matches `data.url` below.
#
# ---------------------------------------------------------------------------
# HOW TO (RE)GENERATE THIS FILE (e.g. for PAT rotation)
# ---------------------------------------------------------------------------
# 1. Temporarily create the plain Secret manifest (do NOT commit it):
#
#    cat > /tmp/gitea-repo-secret.yaml <<'EOF'
#    apiVersion: v1
#    kind: Secret
#    metadata:
#      name: gitea-repo-creds
#      namespace: argocd
#      labels:
#        argocd.argoproj.io/secret-type: repository
#    type: Opaque
#    stringData:
#      url: https://gitea.home.arpa/your-user/kairos.git
#      username: your-gitea-username
#      password: <your-gitea-personal-access-token>
#    EOF
#
# 2. Seal it with kubeseal against the running controller:
#
#    export KUBECONFIG=~/.kube/kairos-config
#    kubeseal --format=yaml \
#      --controller-namespace=sealed-secrets \
#      --controller-name=sealed-secrets-controller \
#      < /tmp/gitea-repo-secret.yaml \
#      > infrastructure/argocd-repos/sealed-gitea-repo.yaml
#
# 3. (Optional) Re-add this header comment, since kubeseal overwrites the
#    whole file. Then commit and push. Delete /tmp/gitea-repo-secret.yaml.
#
# Rotate by repeating these steps. The original PAT is never stored in Git.
# ---------------------------------------------------------------------------
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: gitea-repo-creds
  namespace: argocd
spec:
  encryptedData:
    password: 
    url: 
    username: 
  template:
    metadata:
      labels:
        argocd.argoproj.io/secret-type: repository
      name: gitea-repo-creds
      namespace: argocd
    type: Opaque
