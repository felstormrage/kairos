apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: infrastructure
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 12.6.0
    helm:
      values: |
        strategy:
          type: Recreate

        gitea:
          config:
            database:
              DB_TYPE: sqlite3
              PATH: /data/gitea/gitea.db
            server:
              # TODO: Replace with your internal Gitea URL, for example https://gitea.home.arpa
              ROOT_URL: https://gitea.internal.example.com
            service:
              DISABLE_REGISTRATION: true

        ingress:
          enabled: true
          className: traefik
          annotations:
            # TODO: Use an internal ingress class/annotation if you split internal and external ingress.
            cert-manager.io/cluster-issuer: internal-ca
          hosts:
            - host: gitea.internal.example.com
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: gitea-tls
              hosts:
                - gitea.internal.example.com

        persistence:
          enabled: true
          # TODO: Set this to your preferred storage class, such as local-path, longhorn, or nfs-client.
          storageClass: local-path
          size: 70Gi

        postgresql-ha:
          enabled: false

        postgresql:
          enabled: false

        valkey-cluster:
          enabled: false

        valkey:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
